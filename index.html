<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L-systems</title>
  </head>
  <body>
    <div id="app">
      <canvas id="canvas"></canvas>
      <aside class="panel">
        <h1>L-system Controls</h1>
        <label>
          Preset
          <select id="presets">
            <optgroup label="Trees & plants">
              <option value="tree">Tree</option>
              <option value="bush">Bush</option>
              <option value="pineTree">Pine tree</option>
              <option value="fern">Fern</option>
              <option value="weed">Weed</option>
            </optgroup>
            <optgroup label="Fractals">
              <option value="fractal">Simple fractal</option>
              <option value="kochSnowflake">Koch snowflake</option>
              <option value="sierpinskiTriangle">Sierpiński triangle</option>
              <option value="dragonCurve">Dragon curve</option>
            </optgroup>
          </select>
        </label>
        <label>
          Axiom
          <input id="axiom" type="text" value="F" />
        </label>
        <label>
          Rules
          <textarea id="rules" rows="5">F=FF-[-F+F+F]+[+F-F-F]</textarea>
        </label>
        <label>
          Iterations
          <input id="iterations" type="number" value="4" min="0" step="1" />
        </label>
        <label>
          Angle
          <input id="angle" type="number" value="22.5" step="0.1" />
        </label>
        <label>
          Step
          <input id="step" type="number" value="5" step="0.1" min="0" />
        </label>
        <label>
          Max symbols
          <input id="max-symbols" type="number" value="2000000" min="1" step="1" />
        </label>
        <div class="actions">
          <button id="render" type="button">Render</button>
          <button class="secondary" id="reset-view" type="button">Reset view</button>
          <button class="secondary" id="export-png" type="button">Export PNG</button>
        </div>
        <section class="results" aria-live="polite">
          <p><strong>Progress:</strong> <span id="progress">Idle</span></p>
          <p class="error" id="error-message"></p>
          <p><strong>Final length:</strong> <span id="final-length">-</span></p>
          <p><strong>Preview (first 200):</strong> <span id="preview">-</span></p>
          <p><strong>Bounds:</strong> <span id="bounds">-</span></p>
          <p><strong>Max stack depth:</strong> <span id="max-stack-depth">-</span></p>
        </section>
      </aside>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
